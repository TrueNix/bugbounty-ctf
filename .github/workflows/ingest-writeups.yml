name: Weekly Writeup Ingest

on:
  schedule:
    - cron: "0 7 * * 1"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  ingest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package
        run: python -m pip install -e .

      - name: Ingest public writeups
        env:
          INGEST_DB: data/reference_knowledge.db
          INGEST_LIMIT: "20"
        run: python -m bugbounty_ctf.ingest

      - name: Open ingest pull request
        uses: peter-evans/create-pull-request@v6
        with:
          title: "chore(kb): weekly writeup ingest"
          commit-message: "chore(kb): weekly writeup ingest"
          branch: chore/weekly-writeup-ingest
          delete-branch: true
          add-paths: data/reference_knowledge.db
          body: |
            Weekly ingest of public CTF writeups and appsec advisories.

            This workflow only stores `ingested::` reference documents from public feeds.
